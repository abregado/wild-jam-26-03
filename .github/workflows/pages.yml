name: Web Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /opt/godot
          key: godot-4.6.1-stable-mono

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_linux_x86_64.zip"
          unzip -q Godot_v4.6.1-stable_mono_linux_x86_64.zip -d /opt/godot

      - name: Install Godot
        run: |
          chmod +x "/opt/godot/Godot_v4.6.1-stable_mono_linux_x86_64/Godot_v4.6.1-stable_mono_linux.x86_64"
          sudo ln -sf "/opt/godot/Godot_v4.6.1-stable_mono_linux_x86_64/Godot_v4.6.1-stable_mono_linux.x86_64" /usr/local/bin/godot

      - name: Cache export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-4.6.1-stable-mono

      - name: Download export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable.mono
          unzip -q Godot_v4.6.1-stable_mono_export_templates.tpz -d /tmp/godot-templates
          mv /tmp/godot-templates/templates/* ~/.local/share/godot/export_templates/4.6.1.stable.mono/

      - name: Build C# solution
        run: dotnet build WildJam2603.sln --configuration ExportRelease

      - name: Export Web
        run: |
          mkdir -p build_web
          godot --headless --export-release "Web" build_web/index.html

      - name: Add coi-serviceworker
        # GitHub Pages doesn't send COOP/COEP headers, which Godot web builds need
        # for SharedArrayBuffer. This service worker injects them client-side.
        run: |
          wget -q "https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js" \
            -O build_web/coi-serviceworker.js
          sed -i 's|</head>|<script src="coi-serviceworker.js"></script>\n</head>|' build_web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build_web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
