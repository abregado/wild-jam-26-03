name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /opt/godot
          key: godot-4.6.1-stable

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip"
          unzip -q Godot_v4.6.1-stable_linux.x86_64.zip -d /opt/godot

      - name: Install Godot
        run: |
          chmod +x "/opt/godot/Godot_v4.6.1-stable_linux.x86_64"
          sudo ln -sf "/opt/godot/Godot_v4.6.1-stable_linux.x86_64" /usr/local/bin/godot

      - name: Cache export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-4.6.1-stable

      - name: Download export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable
          unzip -q Godot_v4.6.1-stable_export_templates.tpz -d /tmp/godot-templates
          mv /tmp/godot-templates/templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Export Windows
        run: |
          mkdir -p build
          godot --headless --export-release "Windows Desktop" build/WildJam2603.exe

      - name: Export Linux
        run: |
          mkdir -p build_linux
          godot --headless --export-release "Linux" build_linux/WildJam2603.x86_64

      - name: Export macOS
        run: |
          mkdir -p build_mac
          godot --headless --export-release "macOS" build_mac/WildJam2603.zip

      - name: Export Web
        run: |
          mkdir -p build_web
          godot --headless --export-release "Web" build_web/index.html

      - name: Package
        run: |
          mkdir -p dist
          (cd build       && zip -r ../dist/WildJam2603-Windows.zip .)
          (cd build_linux && zip -r ../dist/WildJam2603-Linux.zip   .)
          cp build_mac/WildJam2603.zip dist/WildJam2603-Mac.zip
          (cd build_web   && zip -r ../dist/WildJam2603-Web.zip     .)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WildJam2603-Windows.zip
            dist/WildJam2603-Linux.zip
            dist/WildJam2603-Mac.zip
            dist/WildJam2603-Web.zip
          generate_release_notes: true

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        # Set ITCHIO_PROJECT in repo secrets to "username/game-slug"
        run: |
          curl -L -o butler.zip "https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default"
          unzip butler.zip
          chmod +x butler
          ./butler push dist/WildJam2603-Windows.zip "${{ secrets.ITCHIO_PROJECT }}:windows" --userversion "${GITHUB_REF_NAME}"
          ./butler push dist/WildJam2603-Linux.zip   "${{ secrets.ITCHIO_PROJECT }}:linux"   --userversion "${GITHUB_REF_NAME}"
          ./butler push build_mac/WildJam2603.zip    "${{ secrets.ITCHIO_PROJECT }}:mac"     --userversion "${GITHUB_REF_NAME}"
          ./butler push build_web                    "${{ secrets.ITCHIO_PROJECT }}:html5"   --userversion "${GITHUB_REF_NAME}"
