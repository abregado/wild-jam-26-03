name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /opt/godot
          key: godot-4.6.1-stable-mono

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_linux_x86_64.zip"
          unzip -q Godot_v4.6.1-stable_mono_linux_x86_64.zip -d /opt/godot

      - name: Install Godot
        run: |
          chmod +x "/opt/godot/Godot_v4.6.1-stable_mono_linux_x86_64/Godot_v4.6.1-stable_mono_linux.x86_64"
          sudo ln -sf "/opt/godot/Godot_v4.6.1-stable_mono_linux_x86_64/Godot_v4.6.1-stable_mono_linux.x86_64" /usr/local/bin/godot

      - name: Cache export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-4.6.1-stable-mono

      - name: Download export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_mono_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable.mono
          unzip -q Godot_v4.6.1-stable_mono_export_templates.tpz -d /tmp/godot-templates
          mv /tmp/godot-templates/templates/* ~/.local/share/godot/export_templates/4.6.1.stable.mono/

      - name: Build C# solution
        run: |
          echo "--- workspace root ---"
          ls -la
          dotnet build WildJam2603.sln --configuration ExportRelease

      - name: Export Windows
        run: |
          mkdir -p build
          godot --headless --export-release "Windows Desktop" build/WildJam2603.exe

      - name: Export Linux
        run: |
          mkdir -p build_linux
          godot --headless --export-release "Linux" build_linux/WildJam2603.x86_64

      - name: Export macOS
        run: |
          mkdir -p build_mac
          godot --headless --export-release "macOS" build_mac/WildJam2603.zip

      - name: Package
        run: |
          mkdir -p dist
          (cd build       && zip -r ../dist/WildJam2603-Windows.zip .)
          (cd build_linux && zip -r ../dist/WildJam2603-Linux.zip   .)
          cp build_mac/WildJam2603.zip dist/WildJam2603-Mac.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WildJam2603-Windows.zip
            dist/WildJam2603-Linux.zip
            dist/WildJam2603-Mac.zip
          generate_release_notes: true
